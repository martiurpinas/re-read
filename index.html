<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re-read</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Encabezado de la página -->
    <header>
        <h1>Re-read</h1>
        <nav>
            <ul>
                <li><a href="#">Re-Read</a></li>
                <li><a href="#">Libros</a></li>
                <li><a href="#">ebooks</a></li>
            </ul>
        </nav>
    </header>

<!-- Contenido de la página -->
    <main>
        <section class="bienvenida">
            <h2>Bienvenido a Re-read</h2>
            <p>Tu lugar para descubrir y compartir libros.</p>
        </section>

        <section class="libros">
            <h2>Libros Destacados</h2>
            <div class="book-list">
                <div class="book-item">
                    <img src="./images/book1.jpg" alt="Libro 1">
                    <h3>El Gran Gatsby</h3>
                    <p>F. Scott Fitzgerald</p>
                </div>
                <div class="book-item">
                    <img src="./images/book2.jpg" alt="Libro 2">
                    <h3>Cien Años de Soledad</h3>
                    <p>Gabriel García Márquez</p>
                </div>
                <div class="book-item">
                    <img src="./images/book3.jpg" alt="Libro 3">
                    <h3>1984</h3>
                    <p>George Orwell</p>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
